<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Radio Transmitter PRO</title>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #0c0f0c; color: #ff3333; padding: 20px; text-align: center; }
        textarea { width: 90%; height: 120px; background-color: #120505; color: #ff3333; border: 1px solid #ff3333; font-size: 20px; padding: 10px; resize: vertical; }
        button { background-color: #221111; color: #ff3333; border: 1px solid #ff3333; padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px; }
        select { background-color: #120505; color: #ff3333; border: 1px solid #ff3333; padding: 10px; font-size: 16px; cursor: pointer; }
        .status { margin-top: 15px; font-size: 14px; color: #aa6666; }
        .controls { margin-bottom: 20px; }
        .slider-box { margin: 20px 0; color: #aa6666; font-size: 14px; }
        .help-box { margin-top: 25px; text-align: left; display: inline-block; width: 90%; background-color: #120505; border: 1px dashed #ff3333; padding: 15px; color: #aa6666; font-size: 14px; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="langSelect" onchange="updateUI()">
            <option value="DE">Deutsch</option>
            <option value="EN">English</option>
            <option value="PL">Polski</option>
            <option value="UA">Українська</option>
        </select>
        <select id="stationSelect" onchange="updateUI()">
            <option value="DE">G03</option>
            <option value="E">E06</option>
            <option value="EN">E03</option>
            <option value="R">S11a</option>
        </select>
    </div>

    <div class="slider-box">
        <label>Zahlengeschwindigkeit (Pause): </label>
        <input type="range" id="speedSlider" min="50" max="1000" value="400">
        <span id="speedVal">400ms</span>
    </div>

    <h1 id="title">RADIO TRANSMITTER</h1>
    <textarea id="messageInput"></textarea><br>
    <button id="btnStart" onclick="startTransmission()">START</button>
    <button id="btnStop" onclick="stopTransmission()">STOP</button>
    <div class="status" id="statusField">System bereit.</div>

    <div class="help-box" id="helpField"></div>

    <script>
        const defaults = {
            "DE": { "DE": "GONG ACHTUNG 5 8 2 9 0 TRENNUNG", "E": "5 8 2 9 0", "EN": "MELODIE 5 8 2 9 0 PAUSE", "R": "ACHTUNG 5 8 2 9 0 TRENNUNG ENDE" },
            "EN": { "DE": "GONG ATTENTION 5 8 2 9 0 SEPARATION", "E": "5 8 2 9 0", "EN": "MELODY 5 8 2 9 0 PAUSE", "R": "ATTENTION 5 8 2 9 0 SEPARATION END" },
            "PL": { "DE": "GONG UWAGA 5 8 2 9 0 SEPARACJA", "E": "5 8 2 9 0", "EN": "MELODIA 5 8 2 9 0 PAUZA", "R": "UWAGA 5 8 2 9 0 SEPARACJA KONIEC" },
            "UA": { "DE": "ГОНГ УВАГА 5 8 2 9 0 РОЗДІЛ", "E": "5 8 2 9 0", "EN": "МЕЛОДІЯ 5 8 2 9 0 ПАУЗА", "R": "УВАГА 5 8 2 9 0 РОЗДІЛ КІНЕЦЬ" }
        };

        const translations = {
            "DE": { title: "RADIO TRANSMITTER", start: "START", stop: "STOPP", status: "System bereit.", g03: "G03 (Deutsch)", e06: "E06 (English Man)", e03: "E03 (Lincolnshire Poacher)", s11a: "S11a (Slawisch)" },
            "EN": { title: "RADIO TRANSMITTER", start: "START", stop: "STOP", status: "System ready.", g03: "G03 (German)", e06: "E06 (English Man)", e03: "E03 (Lincolnshire Poacher)", s11a: "S11a (Slavic)" },
            "PL": { title: "NADAJNIK RADIOWY", start: "URUCHOM", stop: "STOP", status: "System gotowy.", g03: "G03 (Niemiecki)", e06: "E06 (Angielski Głos)", e03: "E03 (Lincolnshire Poacher)", s11a: "S11a (Słowiański)" },
            "UA": { title: "РАДІОПЕРЕДАВАЧ", start: "СТАРТ", stop: "СТОП", status: "Система готова.", g03: "G03 (Німецька)", e06: "E06 (Англійська)", e03: "E03 (Lincolnshire Poacher)", s11a: "S11a (Слов'янська)" }
        };

        const helpTexts = {
            "DE": { "DE": "<h3>G03 (DE):</h3><ul><li>GONG, ACHTUNG, TRENNUNG</li><li>Zahlen: 0-9</li></ul>", "E": "<h3>E06 (E):</h3><ul><li>Nur Zahlen: 0-9</li></ul>", "EN": "<h3>E03 (EN):</h3><ul><li>MELODIE, PAUSE</li><li>Zahlen: 0-9</li></ul>", "R": "<h3>S11a (R):</h3><ul><li>ACHTUNG, TRENNUNG, ENDE</li><li>Zahlen: 0-9</li></ul>" },
            "EN": { "DE": "<h3>G03 (DE):</h3><ul><li>GONG, ATTENTION, SEPARATION</li><li>Numbers: 0-9</li></ul>", "E": "<h3>E06 (E):</h3><ul><li>Numbers only: 0-9</li></ul>", "EN": "<h3>E03 (EN):</h3><ul><li>MELODY, PAUSE</li><li>Numbers: 0-9</li></ul>", "R": "<h3>S11a (R):</h3><ul><li>ATTENTION, SEPARATION, END</li><li>Numbers: 0-9</li></ul>" },
            "PL": { "DE": "<h3>G03 (DE):</h3><ul><li>GONG, UWAGA, SEPARACJA</li><li>Cyfry: 0-9</li></ul>", "E": "<h3>E06 (E):</h3><ul><li>Tylko cyfry: 0-9</li></ul>", "EN": "<h3>E03 (EN):</h3><ul><li>MELODIA, PAUZA</li><li>Cyfry: 0-9</li></ul>", "R": "<h3>S11a (R):</h3><ul><li>UWAGA, SEPARACJA, KONIEC</li><li>Cyfry: 0-9</li></ul>" },
            "UA": { "DE": "<h3>G03 (DE):</h3><ul><li>ГОНГ, УВАГА, РОЗДІЛ</li><li>Цифри: 0-9</li></ul>", "E": "<h3>E06 (E):</h3><ul><li>Тільки цифри: 0-9</li></ul>", "EN": "<h3>E03 (EN):</h3><ul><li>МЕЛОДІЯ, ПАУЗА</li><li>Цифри: 0-9</li></ul>", "R": "<h3>S11a (R):</h3><ul><li>УВАГА, РОЗДІЛ, КІНЕЦЬ</li><li>Цифри: 0-9</li></ul>" }
        };

        const speedSlider = document.getElementById('speedSlider');
        speedSlider.oninput = () => document.getElementById('speedVal').innerText = speedSlider.value + "ms";

        function updateUI() {
            const lang = document.getElementById('langSelect').value;
            const station = document.getElementById('stationSelect').value;
            const t = translations[lang];
            
            document.getElementById('title').innerText = t.title;
            document.getElementById('btnStart').innerText = t.start;
            document.getElementById('btnStop').innerText = t.stop;
            document.getElementById('statusField').innerText = t.status;
            
            const s = document.getElementById('stationSelect');
            s.options[0].text = t.g03; s.options[1].text = t.e06; s.options[2].text = t.e03; s.options[3].text = t.s11a;
            
            document.getElementById('messageInput').value = defaults[lang][station];
            document.getElementById('helpField').innerHTML = helpTexts[lang][station];
        }

        let isPlaying = false, queue = [], queueIndex = 0, currentAudio = null;

        function startTransmission() {
            if (isPlaying) stopTransmission();
            const text = document.getElementById('messageInput').value.toUpperCase();
            const station = document.getElementById('stationSelect').value;
            const rawTokens = text.split(/\s+/).filter(t => t !== "");
            let expandedQueue = [];

            rawTokens.forEach(token => {
                if (["ATTENTION", "UWAGA", "УВАГА", "ACHTUNG"].includes(token)) expandedQueue.push({type: 'word', val: 'ACHTUNG'});
                else if (["SEPARATION", "SEPARACJA", "РОЗДІЛ", "PAUSE", "PAUZA", "ПАУЗА", "TRENNUNG"].includes(token)) expandedQueue.push({type: 'word', val: 'TRENNUNG'});
                else if (["END", "KONIEC", "КІНЕЦЬ", "ENDE"].includes(token)) expandedQueue.push({type: 'word', val: 'ENDE'});
                else if (["MELODY", "MELODIE", "MELODIA", "МЕЛОДІЯ", "ГОНГ", "GONG"].includes(token)) expandedQueue.push({type: 'word', val: 'GONG'});
                else if (/^\d+$/.test(token)) {
                    for (let char of token) expandedQueue.push({type: 'digit', val: char});
                }
            });

            queue = expandedQueue;
            isPlaying = true;
            queueIndex = 0;
            playNext();
        }

        function playNext() {
            if (!isPlaying || queueIndex >= queue.length) { isPlaying = false; return; }
            const station = document.getElementById('stationSelect').value;
            const item = queue[queueIndex];
            const fileName = station + "_" + item.val + ".mp3";
            currentAudio = new Audio(fileName);
            currentAudio.play().catch(() => {});
            currentAudio.onended = () => {
                queueIndex++;
                setTimeout(playNext, (item.type === 'digit') ? parseInt(speedSlider.value) : 600);
            };
        }

        function stopTransmission() { isPlaying = false; if (currentAudio) currentAudio.pause(); }
        updateUI();
    </script>
</body>
</html>
