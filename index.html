<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Radio Transmitter</title>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #0c0f0c; color: #ff3333; padding: 20px; text-align: center; }
        textarea { width: 90%; height: 120px; background-color: #120505; color: #ff3333; border: 1px solid #ff3333; font-size: 20px; padding: 10px; resize: vertical; }
        button { background-color: #221111; color: #ff3333; border: 1px solid #ff3333; padding: 12px 20px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 8px 4px; }
        button:hover { background-color: #331122; }
        select { background-color: #120505; color: #ff3333; border: 1px solid #ff3333; padding: 10px; font-size: 16px; cursor: pointer; margin: 0 5px; }
        .status { margin-top: 15px; font-size: 14px; color: #aa6666; }
        .controls { margin-bottom: 20px; }
        .repo-link { margin-top: 30px; margin-bottom: 15px; }
        .repo-link a { color: #ff3333; text-decoration: none; font-size: 12px; border-bottom: 1px solid #ff3333; }
        
        .help-box { margin-top: 25px; text-align: left; display: inline-block; width: 90%; background-color: #120505; border: 1px dashed #ff3333; padding: 15px; color: #aa6666; font-size: 14px; }
        .help-box ul { padding-left: 20px; margin: 5px 0 0 0; }
        .help-box h3 { margin: 0 0 10px 0; font-size: 16px; color: #ff3333; text-transform: uppercase; }
        
        .control-row { margin: 15px auto; width: 90%; display: flex; align-items: center; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .control-row label { color: #aa6666; font-size: 14px; white-space: nowrap; }
        .control-row input[type=range] { flex: 1; max-width: 200px; accent-color: #ff3333; background: transparent; cursor: pointer; }
        .control-row span { color: #ff3333; font-size: 14px; font-weight: bold; min-width: 40px; text-align: left; }
        
        .progress-bar { width: 90%; height: 20px; background-color: #120505; border: 1px solid #ff3333; margin: 15px auto; position: relative; }
        .progress-fill { height: 100%; background-color: #ff3333; width: 0%; transition: width 0.3s; }
        
        .stats { margin: 15px auto; width: 90%; color: #aa6666; font-size: 13px; }
        .stats-item { display: inline-block; margin: 0 15px; }
        
        .button-group { margin: 15px auto; width: 90%; display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; }
        
        .checkbox-label { color: #aa6666; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
        .checkbox-label input { cursor: pointer; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="langSelect" onchange="updateUI()">
            <option value="DE">Deutsch</option>
            <option value="EN">English</option>
            <option value="PL">Polski</option>
            <option value="UA">Українська</option>
        </select>
        
        <select id="stationSelect" onchange="updateUI()">
            <option value="DE">G03</option>
            <option value="E">E06</option>
            <option value="EN">E03</option>
            <option value="R">S11a</option>
        </select>
    </div>

    <h1 id="title">RADIO TRANSMITTER</h1>
    
    <textarea id="messageInput" onchange="recalculateDuration()" onkeyup="recalculateDuration()"></textarea>
    <br>

    <div class="control-row">
        <label id="speedLabel">Zahlengeschwindigkeit:</label>
        <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1" oninput="updateSpeed()">
        <span id="speedValue">1.0x</span>
    </div>

    <div class="control-row">
        <label id="pauseLabel">Pause zwischen Elementen:</label>
        <input type="range" id="pauseSlider" min="200" max="1500" step="50" value="600" oninput="updatePause()">
        <span id="pauseValue">600ms</span>
    </div>

    <div class="control-row">
        <label id="volumeLabel">Lautstärke:</label>
        <input type="range" id="volumeSlider" min="0" max="100" step="5" value="100" oninput="updateVolume()">
        <span id="volumeValue">100%</span>
    </div>

    <div class="control-row">
        <label class="checkbox-label">
            <input type="checkbox" id="loopCheckbox">
            <span id="loopLabel">Loop aktivieren</span>
        </label>
    </div>

    <div class="button-group">
        <button id="btnStart" onclick="startTransmission()">START</button>
        <button id="btnStop" onclick="stopTransmission()">STOP</button>
        <button id="btnRandom" onclick="generateRandomNumbers()">ZUFALLSZAHLEN</button>
        <button id="btnSave" onclick="saveText()">SPEICHERN</button>
        <button id="btnLoad" onclick="loadText()">LADEN</button>
        <button id="btnExport" onclick="exportAudio()">ALS MP3 EXPORTIEREN</button>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="stats" id="statsField">
        <div class="stats-item" id="durationLabel">Dauer:</div>
        <div class="stats-item"><span id="durationDisplay">0:00</span></div>
        <div class="stats-item" id="currentLabel">Aktuell:</div>
        <div class="stats-item"><span id="currentDisplay">-</span></div>
        <div class="stats-item" id="progressLabel">Fortschritt:</div>
        <div class="stats-item"><span id="progressDisplay">0/0</span></div>
    </div>

    <div class="status" id="statusField">System ready.</div>

    <div class="help-box" id="helpField"></div>

    <div class="repo-link">
        <a href="https://github.com/Slimecrafty/number-station-sounds" target="_blank">
           GitHub Repository
        </a>
    </div>

        const audioDurationCache = {};

        function updateUI() {
            const lang = document.getElementById('langSelect').value;
            const stationSelect = document.getElementById('stationSelect');
            const station = stationSelect.value;
            const t = translations[lang];
            
            document.getElementById('title').innerText = t.title;
            document.getElementById('btnStart').innerText = t.start;
            document.getElementById('btnStop').innerText = t.stop;
            document.getElementById('statusField').innerText = t.status;
            document.getElementById('speedLabel').innerText = t.speedLabel;
            document.getElementById('pauseLabel').innerText = t.pauseLabel;
            document.getElementById('volumeLabel').innerText = t.volumeLabel;
            document.getElementById('durationLabel').innerText = t.durationLabel;
            document.getElementById('currentLabel').innerText = t.currentLabel;
            document.getElementById('progressLabel').innerText = t.progressLabel;
            document.getElementById('loopLabel').innerText = t.loopLabel;
            document.getElementById('btnRandom').innerText = t.random;
            document.getElementById('btnSave').innerText = t.save;
            document.getElementById('btnLoad').innerText = t.load;
            document.getElementById('btnExport').innerText = t.export;
            
            stationSelect.options[0].text = t.g03Label;
            stationSelect.options[1].text = t.e06Label;
            stationSelect.options[2].text = t.e03Label;
            stationSelect.options[3].text = t.s11aLabel;
            
            document.getElementById('messageInput').value = defaults[lang][station];
            document.getElementById('helpField').innerHTML = helpTexts[lang][station];
            
            recalculateDuration();
        }

        function updateSpeed() {
            const val = parseFloat(document.getElementById('speedSlider').value).toFixed(1);
            document.getElementById('speedValue').innerText = val + 'x';
            recalculateDuration();
        }

        function updatePause() {
            const val = parseInt(document.getElementById('pauseSlider').value);
            document.getElementById('pauseValue').innerText = val + 'ms';
            recalculateDuration();
        }

        function updateVolume() {
            const val = parseInt(document.getElementById('volumeSlider').value);
            document.getElementById('volumeValue').innerText = val + '%';
            if (currentAudio) {
                currentAudio.volume = val / 100;
            }
        }

        function generateRandomNumbers() {
            const count = prompt("Wie viele Zufallszahlen? (1-100):", "10");
            if (count === null) return;
            const num = Math.min(Math.max(parseInt(count), 1), 100);
            let result = "";
            for (let i = 0; i < num; i++) {
                result += Math.floor(Math.random() * 10) + " ";
            }
            document.getElementById('messageInput').value = result.trim();
            recalculateDuration();
        }

        function saveText() {
            const text = document.getElementById('messageInput').value;
            const name = prompt("Name zum Speichern:", "meine_sendung");
            if (name) {
                localStorage.setItem('transmission_' + name, text);
                alert("Gespeichert: " + name);
            }
        }

        function loadText() {
            const name = prompt("Name zum Laden:");
            if (name) {
                const text = localStorage.getItem('transmission_' + name);
                if (text) {
                    document.getElementById('messageInput').value = text;
                    recalculateDuration();
                } else {
                    alert("Nicht gefunden: " + name);
                }
            }
        }

        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.round(seconds % 60);
            return mins + ":" + (secs < 10 ? "0" : "") + secs;
        }

        function getAudioDuration(fileName) {
            return new Promise((resolve) => {
                if (audioDurationCache[fileName] !== undefined) {
                    resolve(audioDurationCache[fileName]);
                    return;
                }
                
                const audio = new Audio(fileName);
                audio.onloadedmetadata = () => {
                    audioDurationCache[fileName] = audio.duration;
                    resolve(audio.duration);
                };
                audio.onerror = () => {
                    audioDurationCache[fileName] = 0.8;
                    resolve(0.8);
                };
            });
        }

        async function recalculateDuration() {
            if (isPlaying) return;
            
            const text = document.getElementById('messageInput').value.toUpperCase();
            const station = document.getElementById('stationSelect').value;
            
            const rawTokens = text.split(/\s+/).filter(t => t !== "");
            
            const mappedTokens = rawTokens.map(token => {
                if (["ATTENTION", "UWAGA", "УВАГА", "ACHTUNG"].includes(token)) return "ACHTUNG";
                if (["SEPARATION", "SEPARACJA", "РОЗДІЛ", "PAUSE", "PAUZA", "ПАУЗА", "TRENNUNG"].includes(token)) return "TRENNUNG";
                if (["END", "KONIEC", "КІНЕЦЬ", "ENDE"].includes(token)) return "ENDE";
                if (["MELODY", "MELODIE", "MELODIA", "МЕЛОДІЯ", "ГОНГ", "GONG"].includes(token)) return "GONG";
                return token;
            });
            
            const filteredQueue = mappedTokens.filter(token => {
                if (station === "E") return /^\d$/.test(token);
                if (station === "R") return /^\d$/.test(token) || ["ACHTUNG", "TRENNUNG", "ENDE"].includes(token);
                if (station === "EN") return /^\d$/.test(token) || ["GONG", "TRENNUNG"].includes(token);
                return true; 
            });
            
            if (filteredQueue.length === 0) {
                document.getElementById('durationDisplay').innerText = "0:00";
                return;
            }

            let totalDuration = 0;
            const speed = getSpeed();
            const pause = getPause();

            for (let token of filteredQueue) {
                const isNum = isNumber(token);
                const fileSpeed = isNum ? speed : 1;
                const fileName = station + "_" + token + ".mp3";
                
                const duration = await getAudioDuration(fileName);
                totalDuration += (duration / fileSpeed) + (pause / 1000);
            }

            document.getElementById('durationDisplay').innerText = formatDuration(totalDuration);
        }

        let isPlaying = false;
        let currentAudio = null;
        let queue = [];
        let queueIndex = 0;
        let recordedAudios = [];

        function getSpeed() {
            return parseFloat(document.getElementById('speedSlider').value);
        }

        function getPause() {
            return parseInt(document.getElementById('pauseSlider').value);
        }

        function getVolume() {
            return parseInt(document.getElementById('volumeSlider').value) / 100;
        }

        function isNumber(token) {
            return /^\d$/.test(token);
        }

        function startTransmission() {
            if (isPlaying) stopTransmission();
            const text = document.getElementById('messageInput').value.toUpperCase();
            const station = document.getElementById('stationSelect').value;
            
            const rawTokens = text.split(/\s+/).filter(t => t !== "");
            
            const mappedTokens = rawTokens.map(token => {
                if (["ATTENTION", "UWAGA", "УВАГА", "ACHTUNG"].includes(token)) return "ACHTUNG";
                if (["SEPARATION", "SEPARACJA", "РОЗДІЛ", "PAUSE", "PAUZA", "ПАУЗА", "TRENNUNG"].includes(token)) return "TRENNUNG";
                if (["END", "KONIEC", "КІНЕЦЬ", "ENDE"].includes(token)) return "ENDE";
                if (["MELODY", "MELODIE", "MELODIA", "МЕЛОДІЯ", "ГОНГ", "GONG"].includes(token)) return "GONG";
                return token;
            });
            
            queue = mappedTokens.filter(token => {
                if (station === "E") return /^\d$/.test(token);
                if (station === "R") return /^\d$/.test(token) || ["ACHTUNG", "TRENNUNG", "ENDE"].includes(token);
                if (station === "EN") return /^\d$/.test(token) || ["GONG", "TRENNUNG"].includes(token);
                return true; 
            });
            
            if (queue.length === 0) return;
            isPlaying = true;
            queueIndex = 0;
            recordedAudios = [];
            
            const lang = document.getElementById('langSelect').value;
            const t = translations[lang];
            document.getElementById('statusField').innerText = t.running;
            
            playNext();
        }

        function playNext() {
            if (!isPlaying || queueIndex >= queue.length) {
                const lang = document.getElementById('langSelect').value;
                if (document.getElementById('loopCheckbox').checked && isPlaying) {
                    queueIndex = 0;
                    playNext();
                } else {
                    const t = translations[lang];
                    document.getElementById('statusField').innerText = t.status;
                    document.getElementById('progressFill').style.width = '0%';
                    isPlaying = false;
                    recalculateDuration();
                }
                return;
            }

            const station = document.getElementById('stationSelect').value;
            let token = queue[queueIndex];
            
            if (station === "EN") {
                if (token === "GONG") token = "GONG"; 
                if (token === "TRENNUNG") token = "TRENNUNG";
            }

            const fileName = station + "_" + token + ".mp3";
            const isNum = isNumber(token);
            const speed = isNum ? getSpeed() : 1;
            const volume = getVolume();

            document.getElementById('currentDisplay').innerText = token;
            document.getElementById('progressDisplay').innerText = (queueIndex + 1) + "/" + queue.length;
            document.getElementById('progressFill').style.width = ((queueIndex + 1) / queue.length * 100) + "%";

            currentAudio = new Audio(fileName);
            currentAudio.playbackRate = speed;
            currentAudio.volume = volume;
            currentAudio.play().catch(e => {
                document.getElementById('statusField').innerText = "Error: " + fileName + " missing!";
                isPlaying = false;
            });
            
            currentAudio.onended = () => { 
                recordedAudios.push({file: fileName, speed: speed});
                queueIndex++; 
                const pause = getPause();
                setTimeout(playNext, pause); 
            };
        }

        function stopTransmission() {
            isPlaying = false;
            if (currentAudio) currentAudio.pause();
            const lang = document.getElementById('langSelect').value;
            const t = translations[lang];
            document.getElementById('statusField').innerText = t.stopped;
            document.getElementById('progressFill').style.width = '0%';
            recalculateDuration();
        }

        function exportAudio() {
            if (recordedAudios.length === 0) {
                alert("Erst eine Sendung starten und durchlaufen lassen!");
                return;
            }
            alert("Export wird vorbereitet... (Dies erfordert Web Audio API)");
        }

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isPlaying) {
                    stopTransmission();
                } else {
                    startTransmission();
                }
            }
        });
        
        updateUI();
    </script>
</body>
</html>
