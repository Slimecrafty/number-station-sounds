<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Radio Transmitter</title>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #0c0f0c; color: #ff3333; padding: 20px; text-align: center; }
        textarea { width: 90%; height: 120px; background-color: #120505; color: #ff3333; border: 1px solid #ff3333; font-size: 20px; padding: 10px; resize: vertical; }
        button { background-color: #221111; color: #ff3333; border: 1px solid #ff3333; padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px; }
        select { background-color: #120505; color: #ff3333; border: 1px solid #ff3333; padding: 10px; font-size: 16px; cursor: pointer; }
        .status { margin-top: 15px; font-size: 14px; color: #aa6666; }
        .controls { margin-bottom: 20px; }
        .repo-link { margin-top: 30px; margin-bottom: 15px; }
        .repo-link a { color: #ff3333; text-decoration: none; font-size: 12px; border-bottom: 1px solid #ff3333; }
        
        /* Styling für die Parameter-Erklärung */
        .help-box { margin-top: 25px; text-align: left; display: inline-block; width: 90%; background-color: #120505; border: 1px dashed #ff3333; padding: 15px; color: #aa6666; font-size: 14px; }
        .help-box ul { padding-left: 20px; margin: 5px 0 0 0; }
        .help-box h3 { margin: 0 0 10px 0; font-size: 16px; color: #ff3333; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="langSelect" onchange="updateUI()">
            <option value="DE">Deutsch</option>
            <option value="EN">English</option>
            <option value="PL">Polski</option>
            <option value="UA">Українська</option>
        </select>
        
        <select id="stationSelect" onchange="updateUI()">
            <option value="DE">G03</option>
            <option value="E">E06</option>
            <option value="EN">E03</option>
            <option value="R">S11a</option>
        </select>
    </div>

    <h1 id="title">RADIO TRANSMITTER</h1>
    
    <textarea id="messageInput"></textarea>
    <br>
    <button id="btnStart" onclick="startTransmission()">START</button>
    <button id="btnStop" onclick="stopTransmission()">STOP</button>
    <div class="status" id="statusField">System ready.</div>

    <div class="help-box" id="helpField"></div>

    <div class="repo-link">
        <a href="https://github.com/Slimecrafty/number-station-sounds" target="_blank">
           GitHub Repository
        </a>
    </div>

    <script>
        // Standard-Eingabemuster für alle 4 Sprachen
        const defaults = {
            "DE": { "DE": "GONG ACHTUNG 5 8 2 9 0 TRENNUNG", "E": "5 8 2 9 0", "EN": "MELODIE 5 8 2 9 0 PAUSE", "R": "ACHTUNG 5 8 2 9 0 TRENNUNG ENDE" },
            "EN": { "DE": "GONG ATTENTION 5 8 2 9 0 SEPARATION", "E": "5 8 2 9 0", "EN": "MELODY 5 8 2 9 0 PAUSE", "R": "ATTENTION 5 8 2 9 0 SEPARATION END" },
            "PL": { "DE": "GONG UWAGA 5 8 2 9 0 SEPARACJA", "E": "5 8 2 9 0", "EN": "MELODIA 5 8 2 9 0 PAUZA", "R": "UWAGA 5 8 2 9 0 SEPARACJA KONIEC" },
            "UA": { "DE": "ГОНГ УВАГА 5 8 2 9 0 РОЗДІЛ", "E": "5 8 2 9 0", "EN": "МЕЛОДІЯ 5 8 2 9 0 ПАУЗА", "R": "УВАГА 5 8 2 9 0 РОЗДІЛ КІНЕЦЬ" }
        };

        // UI Übersetzungen
        const translations = {
            "DE": { title: "RADIO TRANSMITTER", start: "SENDUNG STARTEN", stop: "STOPP", status: "System bereit.", g03Label: "G03 (Deutsch)", e06Label: "E06 (English Man)", e03Label: "E03 (Lincolnshire Poacher)", s11aLabel: "S11a (Slawisch)" },
            "EN": { title: "RADIO TRANSMITTER", start: "START TRANSMISSION", stop: "STOP", status: "System ready.", g03Label: "G03 (German)", e06Label: "E06 (English Man)", e03Label: "E03 (Lincolnshire Poacher)", s11aLabel: "S11a (Slavic)" },
            "PL": { title: "NADAJNIK RADIOWY", start: "URUCHOM TRANSMISJĘ", stop: "STOP", status: "System gotowy.", g03Label: "G03 (Niemiecki)", e06Label: "E06 (Angielski Głos)", e03Label: "E03 (Lincolnshire Poacher)", s11aLabel: "S11a (Słowiański)" },
            "UA": { title: "РАДІОПЕРЕДАВАЧ", start: "ПОЧАТИ ПЕРЕДАЧУ", stop: "СТОП", status: "Система готова.", g03Label: "G03 (Німецька)", e06Label: "E06 (Англійська)", e03Label: "E03 (Lincolnshire Poacher)", s11aLabel: "S11a (Слов'янська)" }
        };

        // Dynamische Parameter-Erklärung Box
        const helpTexts = {
            "DE": {
                "DE": "<h3>Parameter für G03 (DE):</h3><ul><li><b>GONG</b> - Spielt <code>DE_GONG.mp3</code></li><li><b>ACHTUNG</b> - Spielt <code>DE_ACHTUNG.mp3</code></li><li><b>TRENNUNG</b> - Spielt <code>DE_TRENNUNG.mp3</code></li><li><b>0-9</b> - Spielt Zahlen (z.B. <code>DE_5.mp3</code>)</li></ul>",
                "E": "<h3>Parameter für E06 (E):</h3><ul><li><b>0-9</b> - Nur reine Zahlen erlaubt (z.B. <code>E_5.mp3</code>).</li></ul>",
                "EN": "<h3>Parameter für E03 (EN):</h3><ul><li><b>MELODIE</b> - Nutzt <code>EN_GONG.mp3</code></li><li><b>PAUSE</b> - Nutzt <code>EN_TRENNUNG.mp3</code></li><li><b>0-9</b> - Spielt Zahlen (z.B. <code>EN_5.mp3</code>)</li></ul>",
                "R": "<h3>Parameter für S11a (R):</h3><ul><li><b>ACHTUNG</b> - Spielt <code>R_ACHTUNG.mp3</code></li><li><b>TRENNUNG</b> - Spielt <code>R_TRENNUNG.mp3</code></li><li><b>ENDE</b> - Spielt <code>R_ENDE.mp3</code></li><li><b>0-9</b> - Spielt Zahlen (z.B. <code>R_5.mp3</code>)</li></ul>"
            },
            "EN": {
                "DE": "<h3>Parameters for G03 (DE):</h3><ul><li><b>GONG</b> - Plays <code>DE_GONG.mp3</code></li><li><b>ATTENTION</b> - Plays <code>DE_ACHTUNG.mp3</code></li><li><b>SEPARATION</b> - Plays <code>DE_TRENNUNG.mp3</code></li><li><b>0-9</b> - Plays numbers (e.g., <code>DE_5.mp3</code>)</li></ul>",
                "E": "<h3>Parameters for E06 (E):</h3><ul><li><b>0-9</b> - Numbers only (Plays e.g., <code>E_5.mp3</code>).</li></ul>",
                "EN": "<h3>Parameters for E03 (EN):</h3><ul><li><b>MELODY</b> - Uses <code>EN_GONG.mp3</code></li><li><b>PAUSE</b> - Uses <code>EN_TRENNUNG.mp3</code></li><li><b>0-9</b> - Plays numbers (e.g., <code>EN_5.mp3</code>)</li></ul>",
                "R": "<h3>Parameters for S11a (R):</h3><ul><li><b>ATTENTION</b> - Plays <code>R_ACHTUNG.mp3</code></li><li><b>SEPARATION</b> - Plays <code>R_TRENNUNG.mp3</code></li><li><b>END</b> - Plays <code>R_ENDE.mp3</code></li><li><b>0-9</b> - Plays numbers (e.g., <code>R_5.mp3</code>)</li></ul>"
            },
            "PL": {
                "DE": "<h3>Parametry dla G03 (DE):</h3><ul><li><b>GONG</b> - Odtwarza <code>DE_GONG.mp3</code></li><li><b>UWAGA</b> - Odtwarza <code>DE_ACHTUNG.mp3</code></li><li><b>SEPARACJA</b> - Odtwarza <code>DE_TRENNUNG.mp3</code></li><li><b>0-9</b> - Odtwarza cyfry (np. <code>DE_5.mp3</code>)</li></ul>",
                "E": "<h3>Parametry dla E06 (E):</h3><ul><li><b>0-9</b> - Dozwolone są tylko cyfry (np. <code>E_5.mp3</code>).</li></ul>",
                "EN": "<h3>Parametry dla E03 (EN):</h3><ul><li><b>MELODIA</b> - Używa <code>EN_GONG.mp3</code></li><li><b>PAUZA</b> - Używa <code>EN_TRENNUNG.mp3</code></li><li><b>0-9</b> - Odtwarza cyfry (np. <code>EN_5.mp3</code>)</li></ul>",
                "R": "<h3>Parametry dla S11a (R):</h3><ul><li><b>UWAGA</b> - Odtwarza <code>R_ACHTUNG.mp3</code></li><li><b>SEPARACJA</b> - Odtwarza <code>R_TRENNUNG.mp3</code></li><li><b>KONIEC</b> - Odtwarza <code>R_ENDE.mp3</code></li><li><b>0-9</b> - Odtwarza cyfry (np. <code>R_5.mp3</code>)</li></ul>"
            },
            "UA": {
                "DE": "<h3>Параметри для G03 (DE):</h3><ul><li><b>ГОНГ</b> - Відтворює <code>DE_GONG.mp3</code></li><li><b>УВАГА</b> - Відтворює <code>DE_ACHTUNG.mp3</code></li><li><b>РОЗДІЛ</b> - Відтворює <code>DE_TRENNUNG.mp3</code></li><li><b>0-9</b> - Відтворює цифри (наприклад, <code>DE_5.mp3</code>)</li></ul>",
                "E": "<h3>Параметри для E06 (E):</h3><ul><li><b>0-9</b> - Дозволені тільки цифри (наприклад, <code>E_5.mp3</code>).</li></ul>",
                "EN": "<h3>Параметри для E03 (EN):</h3><ul><li><b>МЕЛОДІЯ</b> - Використовує <code>EN_GONG.mp3</code></li><li><b>ПАУЗА</b> - Використовує <code>EN_TRENNUNG.mp3</code></li><li><b>0-9</b> - Відтворює цифри (наприклад, <code>EN_5.mp3</code>)</li></ul>",
                "R": "<h3>Параметри для S11a (R):</h3><ul><li><b>УВАГА</b> - Відтворює <code>R_ACHTUNG.mp3</code></li><li><b>РОЗДІЛ</b> - Відтворює <code>R_TRENNUNG.mp3</code></li><li><b>КІНЕЦЬ</b> - Відтворює <code>R_ENDE.mp3</code></li><li><b>0-9</b> - Відтворює цифри (наприклад, <code>R_5.mp3</code>)</li></ul>"
            }
        };

        function updateUI() {
            const lang = document.getElementById('langSelect').value;
            const stationSelect = document.getElementById('stationSelect');
            const station = stationSelect.value;
            const t = translations[lang];
            
            document.getElementById('title').innerText = t.title;
            document.getElementById('btnStart').innerText = t.start;
            document.getElementById('btnStop').innerText = t.stop;
            document.getElementById('statusField').innerText = t.status;
            
            stationSelect.options[0].text = t.g03Label;
            stationSelect.options[1].text = t.e06Label;
            stationSelect.options[2].text = t.e03Label;
            stationSelect.options[3].text = t.s11aLabel;
            
            document.getElementById('messageInput').value = defaults[lang][station];
            document.getElementById('helpField').innerHTML = helpTexts[lang][station];
        }

        let isPlaying = false;
        let currentAudio = null;
        let queue = [];
        let queueIndex = 0;

        function startTransmission() {
            if (isPlaying) stopTransmission();
            let text = document.getElementById('messageInput').value.toUpperCase();
            const station = document.getElementById('stationSelect').value;
            
            // INTELLIGENTES MULTI-LANGUAGE MAPPING SYSTEM
            // Achtung-Mapping (EN, PL, UA -> DE-Stammcode)
            text = text.replace(/ATTENTION/g, "ACHTUNG").replace(/UWAGA/g, "ACHTUNG").replace(/УВАГА/g, "ACHTUNG");
            // Trennung & Pausen-Mapping
            text = text.replace(/SEPARATION/g, "TRENNUNG").replace(/SEPARACJA/g, "TRENNUNG").replace(/РОЗДІЛ/g, "TRENNUNG").replace(/PAUSE/g, "TRENNUNG").replace(/PAUZA/g, "TRENNUNG").replace(/ПАУЗА/g, "TRENNUNG");
            // Ende-Mapping
            text = text.replace(/END/g, "ENDE").replace(/KONIEC/g, "ENDE").replace(/КІНЕЦЬ/g, "ENDE");
            // Melodie & Gong-Mapping
            text = text.replace(/MELODY/g, "GONG").replace(/MELODIE/g, "GONG").replace(/MELODIA/g, "GONG").replace(/МЕЛОДІЯ/g, "GONG").replace(/ГОНГ/g, "GONG");
            
            const rawTokens = text.split(/\s+/).filter(t => t !== "");
            
            queue = rawTokens.filter(token => {
                if (station === "E") return /^\d$/.test(token);
                if (station === "R") return /^\d$/.test(token) || token === "TRENNUNG" || token === "ENDE" || token === "ACHTUNG";
                return true; 
            });
            
            if (queue.length === 0) return;
            isPlaying = true;
            queueIndex = 0;
            
            const lang = document.getElementById('langSelect').value;
            let runningText = "Transmission running...";
            if (lang === "DE") runningText = "Sendung läuft...";
            if (lang === "PL") runningText = "Transmisja trwa...";
            if (lang === "UA") runningText = "Передача триває...";
            document.getElementById('statusField').innerText = runningText;
            
            playNext();
        }

        function playNext() {
            if (!isPlaying || queueIndex >= queue.length) {
                const lang = document.getElementById('langSelect').value;
                document.getElementById('statusField').innerText = translations[lang].status;
                isPlaying = false;
                return;
            }

            const station = document.getElementById('stationSelect').value;
            const token = queue[queueIndex];
            const fileName = station + "_" + token + ".mp3";

            currentAudio = new Audio(fileName);
            currentAudio.play().catch(e => {
                document.getElementById('statusField').innerText = "Error: " + fileName + " missing!";
                isPlaying = false;
            });
            
            currentAudio.onended = () => { 
                queueIndex++; 
                setTimeout(playNext, 600); 
            };
        }

        function stopTransmission() {
            isPlaying = false;
            if (currentAudio) currentAudio.pause();
            const lang = document.getElementById('langSelect').value;
            let stoppedText = "Stopped.";
            if (lang === "DE") stoppedText = "Gestoppt.";
            if (lang === "PL") stoppedText = "Zatrzymano.";
            if (lang === "UA") stoppedText = "Зупинено.";
            document.getElementById('statusField').innerText = stoppedText;
        }
        
        updateUI();
    </script>
</body>
</html>
