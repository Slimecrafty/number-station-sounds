<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Radio Transmitter</title>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #0c0f0c; color: #ff3333; padding: 20px; text-align: center; }
        textarea { width: 90%; height: 120px; background-color: #120505; color: #ff3333; border: 1px solid #ff3333; font-size: 20px; padding: 10px; resize: vertical; }
        button { background-color: #221111; color: #ff3333; border: 1px solid #ff3333; padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px; }
        select { background-color: #120505; color: #ff3333; border: 1px solid #ff3333; padding: 10px; font-size: 16px; cursor: pointer; }
        .status { margin-top: 15px; font-size: 14px; color: #aa6666; }
        .controls { margin-bottom: 20px; }
        .repo-link { margin-top: 30px; margin-bottom: 15px; }
        .repo-link a { color: #ff3333; text-decoration: none; font-size: 12px; border-bottom: 1px solid #ff3333; }
        
        /* Styling für die Parameter-Erklärung */
        .help-box { margin-top: 25px; text-align: left; display: inline-block; width: 90%; background-color: #120505; border: 1px dashed #ff3333; padding: 15px; color: #aa6666; font-size: 14px; }
        .help-box ul { padding-left: 20px; margin: 5px 0 0 0; }
        .help-box h3 { margin: 0 0 10px 0; font-size: 16px; color: #ff3333; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="langSelect" onchange="updateUI()">
            <option value="DE">Deutsch</option>
            <option value="EN">English</option>
        </select>
        
        <select id="stationSelect" onchange="updateUI()">
            <option value="DE">G03</option>
            <option value="E">E06</option>
            <option value="EN">E03</option>
        </select>
    </div>

    <h1 id="title">RADIO TRANSMITTER</h1>
    
    <textarea id="messageInput"></textarea>
    <br>
    <button id="btnStart" onclick="startTransmission()">START</button>
    <button id="btnStop" onclick="stopTransmission()">STOP</button>
    <div class="status" id="statusField">System ready.</div>

    <div class="help-box" id="helpField"></div>

    <div class="repo-link">
        <a href="https://github.com/Slimecrafty/number-station-sounds" target="_blank">
           GitHub Repository
        </a>
    </div>

    <script>
        // Defaults für das Eingabefeld
        const defaults = {
            "DE": { 
                "DE": "GONG ACHTUNG 5 8 2 9 0 TRENNUNG", 
                "E": "5 8 2 9 0", 
                "EN": "MELODIE 5 8 2 9 0 PAUSE" 
            },
            "EN": { 
                "DE": "GONG ATTENTION 5 8 2 9 0 SEPARATION", 
                "E": "5 8 2 9 0", 
                "EN": "MELODY 5 8 2 9 0 PAUSE" 
            }
        };

        // UI Übersetzungen
        const translations = {
            "DE": { 
                title: "RADIO TRANSMITTER", start: "SENDUNG STARTEN", stop: "STOPP", status: "System bereit.",
                g03Label: "G03 (Deutsch)", e06Label: "E06 (English Man)", e03Label: "E03 (Lincolnshire Poacher)"
            },
            "EN": { 
                title: "RADIO TRANSMITTER", start: "START TRANSMISSION", stop: "STOP", status: "System ready.",
                g03Label: "G03 (German)", e06Label: "E06 (English Man)", e03Label: "E03 (Lincolnshire Poacher)"
            }
        };

        // Dynamische Parameter-Erklärung für jede Station und jede Sprache
        const helpTexts = {
            "DE": {
                "DE": "<h3>Parameter für G03 (DE):</h3><ul><li><b>GONG</b> - Spielt die Datei <code>DE_GONG.mp3</code></li><li><b>ACHTUNG</b> - Spielt die Datei <code>DE_ACHTUNG.mp3</code></li><li><b>TRENNUNG</b> - Spielt die Datei <code>DE_TRENNUNG.mp3</code></li><li><b>0-9</b> - Spielt die jeweiligen Zahlen-Dateien (z.B. <code>DE_5.mp3</code>)</li></ul>",
                "E": "<h3>Parameter für E06 (E):</h3><ul><li><b>0-9</b> - Diese Station akzeptiert <u>nur reine Zahlen</u> (Spielt z.B. <code>E_5.mp3</code>). Alle Textbefehle werden ignoriert.</li></ul>",
                "EN": "<h3>Parameter für E03 (EN):</h3><ul><li><b>MELODIE</b> - Nutzt im Hintergrund die Datei <code>EN_GONG.mp3</code></li><li><b>PAUSE</b> - Nutzt im Hintergrund die Datei <code>EN_TRENNUNG.mp3</code></li><li><b>0-9</b> - Spielt die jeweiligen Zahlen-Dateien (z.B. <code>EN_5.mp3</code>)</li></ul>"
            },
            "EN": {
                "DE": "<h3>Parameters for G03 (DE):</h3><ul><li><b>GONG</b> - Plays the file <code>DE_GONG.mp3</code></li><li><b>ATTENTION</b> - Plays the file <code>DE_ACHTUNG.mp3</code></li><li><b>SEPARATION</b> - Plays the file <code>DE_TRENNUNG.mp3</code></li><li><b>0-9</b> - Plays the respective number files (e.g., <code>DE_5.mp3</code>)</li></ul>",
                "E": "<h3>Parameters for E06 (E):</h3><ul><li><b>0-9</b> - This station accepts <u>numbers only</u> (Plays e.g., <code>E_5.mp3</code>). Text parameters are stripped out.</li></ul>",
                "EN": "<h3>Parameters for E03 (EN):</h3><ul><li><b>MELODY</b> - Uses the file <code>EN_GONG.mp3</code> behind the scenes</li><li><b>PAUSE</b> - Uses the file <code>EN_TRENNUNG.mp3</code> behind the scenes</li><li><b>0-9</b> - Plays the respective number files (e.g., <code>EN_5.mp3</code>)</li></ul>"
            }
        };

        function updateUI() {
            const lang = document.getElementById('langSelect').value;
            const stationSelect = document.getElementById('stationSelect');
            const station = stationSelect.value;
            const t = translations[lang];
            
            // UI Texte anpassen
            document.getElementById('title').innerText = t.title;
            document.getElementById('btnStart').innerText = t.start;
            document.getElementById('btnStop').innerText = t.stop;
            document.getElementById('statusField').innerText = t.status;
            
            // Dropdown-Optionen live übersetzen
            stationSelect.options[0].text = t.g03Label;
            stationSelect.options[1].text = t.e06Label;
            stationSelect.options[2].text = t.e03Label;
            
            // Textbox-Inhalt & Parameter-Erklärung anpassen
            document.getElementById('messageInput').value = defaults[lang][station];
            document.getElementById('helpField').innerHTML = helpTexts[lang][station];
        }

        let isPlaying = false;
        let currentAudio = null;
        let queue = [];
        let queueIndex = 0;

        function startTransmission() {
            if (isPlaying) stopTransmission();
            let text = document.getElementById('messageInput').value.toUpperCase();
            const station = document.getElementById('stationSelect').value;
            
            // HINTERGRUND-MAPPING FÜR ENGLISCHE UND DEUTSCHE INPUTS
            if (station === "EN") {
                text = text.replace(/MELODIE/g, "GONG").replace(/MELODY/g, "GONG");
                text = text.replace(/PAUSE/g, "TRENNUNG");
            }
            if (station === "DE") {
                text = text.replace(/ATTENTION/g, "ACHTUNG");
                text = text.replace(/SEPARATION/g, "TRENNUNG");
            }
            
            const rawTokens = text.split(/\s+/).filter(t => t !== "");
            
            // Filterregeln anwenden
            queue = rawTokens.filter(token => {
                if (station === "E") return /^\d$/.test(token); // E06 erlaubt strikt nur Zahlen
                return true; 
            });
            
            if (queue.length === 0) return;
            isPlaying = true;
            queueIndex = 0;
            
            const lang = document.getElementById('langSelect').value;
            document.getElementById('statusField').innerText = lang === "DE" ? "Sendung läuft..." : "Transmission running...";
            playNext();
        }

        function playNext() {
            if (!isPlaying || queueIndex >= queue.length) {
                const lang = document.getElementById('langSelect').value;
                document.getElementById('statusField').innerText = translations[lang].status;
                isPlaying = false;
                return;
            }

            const station = document.getElementById('stationSelect').value;
            const token = queue[queueIndex];
            const fileName = station + "_" + token + ".mp3";

            currentAudio = new Audio(fileName);
            currentAudio.play().catch(e => {
                document.getElementById('statusField').innerText = "Error: " + fileName + " missing!";
                isPlaying = false;
            });
            
            currentAudio.onended = () => { 
                queueIndex++; 
                setTimeout(playNext, 600); 
            };
        }

        function stopTransmission() {
            isPlaying = false;
            if (currentAudio) currentAudio.pause();
            const lang = document.getElementById('langSelect').value;
            document.getElementById('statusField').innerText = lang === "DE" ? "Gestoppt." : "Stopped.";
        }
        
        // Start-Initialisierung
        updateUI();
    </script>
</body>
</html>
